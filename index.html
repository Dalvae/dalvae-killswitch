<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kill Switch Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 3rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { opacity: 0.7; margin-bottom: 2rem; }
        .url-box {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 1.5rem;
        }
        .url-box a { color: #4ade80; text-decoration: none; }
        .url-box a:hover { text-decoration: underline; }
        .btn {
            display: inline-block;
            background: #4ade80;
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        code {
            background: rgba(0,0,0,0.3);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ Kill Switch</h1>
        <p>Control remoto para tu sitio WordPress</p>
        
        <div class="url-box">
            <a href="killswitch.json" id="json-url">killswitch.json</a>
        </div>
        
        <p style="font-size: 0.9rem;">
            Configura tu WordPress con:<br>
            <code>define('KILLSWITCH_REMOTE_URL', '<span id="full-url"></span>');</code>
        </p>
        
        <a href="https://github.com/Dalvae/dalvae-killswitch/blob/main/killswitch.json" class="btn" id="edit-btn">Editar Config</a>
    </div>
    
    <script>
        const user = 'Dalvae';
        const repo = 'dalvae-killswitch';
        const baseUrl = `https://${user}.github.io/${repo}`;
        
        document.getElementById('json-url').href = 'killswitch.json';
        document.getElementById('json-url').textContent = `${baseUrl}/killswitch.json`;
        document.getElementById('full-url').textContent = `${baseUrl}/killswitch.json`;
        document.getElementById('edit-btn').href = `https://github.com/${user}/${repo}/blob/main/killswitch.json`;
    </script>
</body>
</html>
